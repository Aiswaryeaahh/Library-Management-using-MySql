{% extends 'base.html' %}

{% block title %}Issues & Returns - LibriSys{% endblock %}
{% block header %}Issues & Returns{% endblock %}

{% block content %}
<div class="table-container glass-panel">
    <div class="table-header">
        <h2>Book Issues</h2>
        <button class="btn btn-secondary" onclick="openIssueModal()">+ Issue Book</button>
    </div>
    
    <div style="overflow-x:auto;">
        <table id="issues-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Book</th>
                    <th>Member</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Issue Book Modal -->
<div id="issueBookModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Issue Book</h2>
            <button class="close-modal" onclick="closeModal('issueBookModal')">&times;</button>
        </div>
        <form id="issueBookForm" onsubmit="issueBook(event)">
            <div class="modal-body">
                <div class="input-group">
                    <label>Select Member</label>
                    <select id="issue-member-id" required class="form-select">
                        <option value="">-- Select Member --</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="input-group">
                    <label>Select Book</label>
                    <select id="issue-book-id" required class="form-select">
                        <option value="">-- Select Book --</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal('issueBookModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Issue Book</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', loadIssues);
</script>
<style>
    .form-select {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--gray-300);
        border-radius: var(--radius-md);
        font-size: 1rem;
        background-color: white;
        outline: none;
    }
    .form-select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
</style>
{% endblock %}
