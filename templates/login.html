{% extends 'base.html' %}

{% block title %}Login - LibriSys{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card glass-panel">
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Sign in to manage the library</p>
        </div>
        
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login" class="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username (admin)">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password (admin)">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem;">
            <a href="{{ url_for('user_login') }}">User Login</a> | 
            <a href="{{ url_for('user_register') }}">Register as User</a>
        </p>
    </div>
</div>
{% endblock %}
